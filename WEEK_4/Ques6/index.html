<!DOCTYPE html>
<html>
<head>
    <title>Frames Example</title>
</head>

<frameset rows="50%,50%">

    <!-- First Row -->
    <frame src="top.html">

    <!-- Second Row divided into two equal columns -->
    <frameset cols="50%,50%">
        <frame src="bottomleft.html">
        <frame src="bottomright.html">
    </frameset>

</frameset>

</html>
