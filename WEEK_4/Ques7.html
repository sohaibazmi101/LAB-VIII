<!DOCTYPE html>
<html>
<head>
    <title>3x3 Image Grid</title>
    <style>
        body {
            margin: 0;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            height: 60vh;
            width: 60vw;
            margin: auto;
            margin-top: 40px;
        }

        .cell {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-cell {
            border: 2px solid black;
        }

        img {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="cell image-cell">
            <img src="images.jpg" alt="Image 1">
        </div>
        <div class="cell"></div>
        <div class="cell"></div>

        <div class="cell"></div>
        <div class="cell image-cell">
            <img src="images.jpg" alt="Image 2">
        </div>
        <div class="cell"></div>

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell image-cell">
            <img src="images.jpg" alt="Image 3">
        </div>
    </div>

</body>
</html>
