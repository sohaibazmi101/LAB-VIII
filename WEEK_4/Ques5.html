<!DOCTYPE html>
<html>
<head>
    <title>Table Layout</title>
    <style>
        table, td {
            border: 1px solid black;
            border-collapse: collapse;
            text-align: center;
            width: 600px;
            height: 40px;
            margin: auto;
        }
        img {
            width: fit-content;
        }
    </style>
</head>
<body>

<table width="60%">
    <!-- First Row -->
    <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>4</td>
    </tr>

    <!-- Second Row -->
    <tr>
        <td>5</td>
        <td rowspan="2" colspan="2">
            <img src="images.jpg" alt="Sample Image">
        </td>
        <td>6</td>
    </tr>

    <!-- Third Row -->
    <tr>
        <td>7</td>
        <td>8</td>
    </tr>

    <!-- Fourth Row -->
    <tr>
        <td>9</td>
        <td>10</td>
        <td>11</td>
        <td>12</td>
    </tr>
</table>

<br>

<table width="70%">
    <tr>
        <td colspan="2" rowspan="2">
            <img src="images.jpg" alt="Sample Image">
        </td>
        <td>A</td>
        <td>B</td>
    </tr>
    <tr>
        <td>C</td>
        <td>D</td>
    </tr>
    <tr>
        <td>E</td>
        <td>F</td>
        <td>G</td>
        <td>H</td>
    </tr>
</table>

</body>
</html>
