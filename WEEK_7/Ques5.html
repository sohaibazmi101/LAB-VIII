<!DOCTYPE html>
<html lang="en">

<head>
    <title>Image event handler</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b539b;
            text-align: center;
            color: #fff;
            margin-top: 50px;
        }
        h1
        {
            color: #f8f8f8;
        }

        img {
            border-radius: 15px;
            transition: transform 0.9s smooth;
        }
    </style>
</head>

<body>

    <h1>Image Handler</h1>

    <img src="img1.png" alt="My Image" id="myImage" width="300px" height="200px" onmouseover="changeImage()" onmouseout="resetImage()">

    <script>
        function changeImage() {
            document.getElementById("myImage").src = "img2.jpg";
        }

        function resetImage() {
            document.getElementById("myImage").src = "img1.png";
        }
    </script>

</body>

</html>
