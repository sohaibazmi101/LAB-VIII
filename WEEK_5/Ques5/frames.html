<!DOCTYPE html>
<html>
<head>
    <title>Frames Layout</title>
</head>

<frameset cols="30%,70%" border="1">

    <frame src="myframe.html" name="myframe">

    <frameset rows="50%,50%">

        <frame src="frame1.html" name="frame1">

        <frameset cols="50%,50%">
            <frame src="frame2.html" name="frame2">
            <frame src="frame3.html" name="frame3">
        </frameset>

    </frameset>

</frameset>

</html>
