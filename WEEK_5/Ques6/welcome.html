<!DOCTYPE html>
<html>
<head>
    <title>Welcome Page</title>

    <script>
        function getName() {
            var params = new URLSearchParams(window.location.search);
            var name = params.get("username");
            document.getElementById("message").innerHTML = "Welcome " + name;
        }
    </script>

</head>
<body onload="getName()">

<h2 id="message"></h2>

</body>
</html>
