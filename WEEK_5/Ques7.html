<!DOCTYPE html>
<html>
<head>
    <title>All Input Types Form</title>
</head>
<body>

<h2>Registration Form</h2>

<form>

    <!-- Text -->
    Name:
    <input type="text" name="name"><br><br>

    <!-- Password -->
    Password:
    <input type="password" name="password"><br><br>

    <!-- Email -->
    Email:
    <input type="email" name="email"><br><br>

    <!-- Number -->
    Age:
    <input type="number" name="age"><br><br>

    <!-- Tel -->
    Phone:
    <input type="tel" name="phone"><br><br>

    <!-- URL -->
    Website:
    <input type="url" name="website"><br><br>

    <!-- Search -->
    Search:
    <input type="search" name="search"><br><br>

    <!-- Date -->
    Date of Birth:
    <input type="date" name="dob"><br><br>

    <!-- Time -->
    Time:
    <input type="time" name="time"><br><br>

    <!-- Datetime-local -->
    Date & Time:
    <input type="datetime-local" name="datetime"><br><br>

    <!-- Month -->
    Month:
    <input type="month" name="month"><br><br>

    <!-- Week -->
    Week:
    <input type="week" name="week"><br><br>

    <!-- Color -->
    Favorite Color:
    <input type="color" name="color"><br><br>

    <!-- Range -->
    Range:
    <input type="range" name="range"><br><br>

    <!-- Radio -->
    Gender:
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female
    <br><br>

    <!-- Checkbox -->
    Hobbies:
    <input type="checkbox" name="hobby" value="reading"> Reading
    <input type="checkbox" name="hobby" value="sports"> Sports
    <br><br>

    <!-- File -->
    Upload File:
    <input type="file" name="file"><br><br>

    <!-- Hidden -->
    <input type="hidden" name="userid" value="12345">

    <!-- Submit -->
    <input type="submit" value="Submit">

    <!-- Reset -->
    <input type="reset" value="Reset">

    <!-- Button -->
    <input type="button" value="Click Me">

</form>

</body>
</html>
