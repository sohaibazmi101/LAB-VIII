<!DOCTYPE>
<html>

<head>
    <title>
        Digital Clock
    </title>

    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            background: #200765;
            color: #fff;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #0d407a;
            padding: 30px 40px;
            align-items: center;
            justify-content: center;
        }

        #time {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 10px 0;
            color: #22c55e;
        }

        #date,
        #today {
            font-size: 18px;
            margin: 5px 0;
            color: #cbd5f5;
        }

        #time {
            text-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            animation: fadeIn 0.8s ease;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>
            Digital Clock
        </h1>

        <p id="time"></p>
        <p id="date"></p>
        <p id="today"></p>
    </div>


    <script>
        function digitalClock() {
            let now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();
            let day = now.getDate();
            let month = now.getMonth() + 1;
            let year = now.getFullYear();

            let days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

            let dayIndex = now.getDay();

            let today = days[dayIndex];


            s = s.toString().padStart(2, "0");
            m = m.toString().padStart(2, "0");

            let dateStr = day.toString().padStart(2, "0") + "/" + month.toString().padStart(2, "0") + "/" + year;

            document.getElementById("time").textContent = h + ":" + m + ":" + s;
            document.getElementById("date").textContent = dateStr;
            document.getElementById("today").textContent = today;
        }
        setInterval(digitalClock, 1000);
        digitalClock();
    </script>
</body>

</html>
