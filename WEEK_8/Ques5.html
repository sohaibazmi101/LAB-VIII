<!DOCTYPE>

<html>

<head>
    <title>
        Time and Message
    </title>

    <style>
        body{
            place-items: center;
            margin-top: 20px;
            background: #4a0c85;
            color: #fff;
            display: grid;
        }
    </style>
</head>

<body>
    <h2 id="time"></h2>
    <h2 id="message"></h2>

    <script>
        let msg = "";
        function updateTime() {
            let now = new Date();
            let hrs = now.getHours();
            let minute = now.getMinutes();
            let second = now.getSeconds();
            let currentTime = hrs + ":" + minute + ":" + second;
            document.getElementById("time").textContent = currentTime;

            if (hrs < 12) {
                msg = "Good Morning";
            } else if (hrs < 17) {
                msg = "Good Afternoon";
            } else if (hrs < 21) {
                msg = "Good Evening";
            } else {
                msg = "Good Night";
            }
            document.getElementById("message").textContent = msg;
        }

        setInterval(updateTime, 1000);
        updateTime();

    </script>
</body>

</html>
