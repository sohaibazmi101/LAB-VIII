<!DOCTYPE html>
<html lang="en">
<head>
    <title>Form Submission</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            margin-top: 50px;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        h2 {
            text-decoration: underline;
            text-align: center;
        }

        form {
            width: 50%;
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 70%;
            padding: 8px;
            margin-top: 5px;
            margin-left: 50px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: none;
            height: 40px;
        }

        .gender-group {
            margin-top: 5px;
            display: flex;
        }

        .gender-group input {
            width: auto;
            margin-right: 5px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
        .nameFeild{
            display: flex;
        }
    </style>
</head>

<body>

<form>
    <h2>Details</h2>

    <div class="nameFeild">
        <label for="name">Your Name</label>
    <input type="text" id="name" placeholder="Enter your name">
    </div>

   <div class="nameFeild">
     <label for="address">Your Address</label>
    <textarea id="address" placeholder="Enter your address"></textarea>
   </div>

    <div class="nameFeild">
        <label>Your Gender</label>
    <div class="gender-group">
        <input type="radio" name="gender" id="male">
        <label for="male">Male</label>

        <input type="radio" name="gender" id="female">
        <label for="female">Female</label>
    </div>
    </div>

    <div class="nameFeild">
        <label for="country">Your Country</label>
    <select id="country">
        <option value="">Select Country</option>
        <option value="india">India</option>
        <option value="usa">USA</option>
        <option value="uk">UK</option>
        <option value="uae">UAE</option>
        <option value="saudi">Saudi Arabia</option>
        <option value="canada">Canada</option>
    </select>
    </div>

    <div class="nameFeild">
        <label for="opinion">Your Opinion</label>
    <textarea id="opinion" placeholder="Type your message here"></textarea>
    </div>

    <button type="submit">Submit</button>
</form>

</body>
</html>
