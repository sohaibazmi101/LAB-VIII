<!DOCTYPE html>
<html>

<head>
    <title>Questionare</title>

    <style>
        body {
            background: #260c74;
            color: #fff;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .formContainer {
            background: #181db7;
            color: #fff;
            display: block;
            height: 50%;
            width: 600px;
            margin-top: 20px;
        }

        .feild {
            display: flex;
            align-items: center;
            margin-top: 20px;
        }

        .feild label {
            width: 300px;
        }

        .feild input {
            flex: 1;
            padding: 8px;
            border-radius: 5px;
            border: none;
            margin: 18px;
        }

        .formContainer button {
            margin: 15px;
            width: 50%;
            padding: 5px;
        }

        .container {
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Questions</h1>

        <form id="myForm">
            <div class="formContainer">
                <div class="feild">
                    <label>What is Your Name:</label>
                    <input type="text" id="username" name="username">
                </div>

                <div class="feild">
                    <label>Upload Your Image:</label>
                    <input type="file" id="image" accept="image/*" onchange="checkFile()">
                </div>

                <div class="feild">
                    <label>What is your Age:</label>
                    <input type="number" id="age" name="age">
                </div>

                <div class="feild">
                    <label>What is Current Project Name:</label>
                    <input type="text" id="project" name="project">
                </div>

                <div class="feild">
                    <label>What is Name of College name</label>
                    <input type="text" id="college" name="college">
                </div>

                <div class="feild">
                    <label>What is your Email ID:</label>
                    <input type="email" id="email" name="email">
                </div>

                <div class="feild">
                    <label>What is your mobile number:</label>
                    <input type="tel" id="pNumber" name="pNumber">
                </div>

                <button type="submit">Submit</button>
            </div>

        </form>
    </div>

    <script>

        const form = document.getElementById("myForm");
        function checkFile() {
            const file = document.getElementById("image").files[0];
            console.log("Image selected:", file);
        }

        window.checkFile = checkFile;
        form.addEventListener("submit", function (event) {
            event.preventDefault();
            const name = document.getElementById("username").value;
            const age = document.getElementById("age").value;
            const project = document.getElementById("project").value;
            const college = document.getElementById("college").value;
            const email = document.getElementById("email").value;
            const pNumber = document.getElementById("pNumber").value;

            const file = document.getElementById("image").files[0];
            const reader = new FileReader();
            reader.onload = function () {
                const imageData = reader.result;
                localStorage.setItem("username", name);
                localStorage.setItem("age", age);
                localStorage.setItem("project", project);
                localStorage.setItem("college", college);
                localStorage.setItem("email", email);
                localStorage.setItem("pNumber", pNumber);
                localStorage.setItem("image", imageData);
                window.location.href = "f2.html";
            }
            if (file) {
                reader.readAsDataURL(file);
            } else {
                alert("Please Select an Image");
            }


        });
    </script>


</body>

</html>
