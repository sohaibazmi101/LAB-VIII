<!DOCTYPE html>
<html lang="en">

<head>
    <title>Rsult Page</title>

    <style>
        body{
            background: #1b1794;
            color: #fff;

            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container{
            background: #1c3f8d;
            color: #fff;
            border-radius: 20px;
            border: none;
            align-items: center;
            justify-content: center;
        }
        h1{
            color: aqua;
            margin: 20px;
            font-size: 48px;
            text-shadow: #10db13;
            font-family: cursive;
            align-items: center;
            justify-content: center;
        }
        .feild{
            display: flex;
            flex-direction: column;
            margin: 8px;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #10db13;
        }
    </style>
</head>

<body>


    <div class="container">
        <h1>Your Submittes Data</h1>

        <div class="feild">
            <p id="username"></p>
            <img id="image" width="160">
            <p id="age"></p>
            <p id="project"></p>
            <p id="college"></p>
            <p id="email"></p>
            <p id="pNumber"></p>
        </div>
    </div>

    <script>
        const name = localStorage.getItem("username");
        const age = localStorage.getItem("age");
        const project = localStorage.getItem("project");
        const college = localStorage.getItem("college");
        const email = localStorage.getItem("email");
        const pNumber = localStorage.getItem("pNumber");
        const image = localStorage.getItem("image");

        document.getElementById("username").textContent = "Name: " + name;
        document.getElementById("age").textContent = "Age: " + age;
        document.getElementById("project").textContent = "Project: "+project;
        document.getElementById("college").textContent = "College: "+college;
        document.getElementById("email").textContent = "Email: "+email;
        document.getElementById("pNumber").textContent = "Number: "+pNumber;
        if (image){
            document.getElementById("image").src = image;
        }
    </script>

</body>

</html>
