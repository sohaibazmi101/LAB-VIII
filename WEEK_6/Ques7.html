<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Greeting Page</title>
</head>

<body st>

<script>
  const showGreeting = confirm("Do you want to see a greeting message?");

  if (showGreeting) {
    const img = document.createElement("img");
    img.src = "Welcome.gif";
    img.style.width = "200px";
    img.style.height = "200px";

    const text = document.createElement("h2");
    text.textContent = "Welcome to Department of Computer Science!";

    document.body.appendChild(img);
    document.body.appendChild(text);
  }
</script>

</body>
</html>
