<!DOCTYPE html>
<html>

<head>
    <title>Enhancement Page</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #11136b;
            color: #fff;
        }
        img{
            border-radius: 20px;
            margin-top: 20px;
        }
        .menuItems{
            padding: 10px;
        }
        .menuItems select{
            padding: 10px;
            width: 180px;
        }
        .turns{
            margin-bottom: 35px;
        }
        .animate{
            transform: scale(1.3);
            transition: 0.3s ease-in-out;
        }
    </style>
</head>

<body>
    <h1>Interactive Web Page</h1>
    <img id="myImage" src="./assets/gen.png" alt="img" width="200" onmouseover="changeImage()"
        onmouseout="resetImage()"
        onclick="animateImage()">

    <div class="menuItems">
        <select id="menu" onchange="gotoPage()">
            <option value="">Select Page</option>
            <option value="./assets/page1.html">Page 1</option>
            <option value="./assets/page2.html">Page 2</option>
        </select>

    </div>

    <script>
        function changeImage(){
            document.getElementById("myImage").src = "./assets/icon.png";
        }
        function resetImage(){
            document.getElementById("myImage").src = "./assets/gen.png";
        }
        function animateImage(){
            const img = document.getElementById("myImage");
            img.classList.toggle("animate");
            img.classList.toggle("turns");
        }
        function gotoPage(){
            const selectedPage = document.getElementById("menu").value;
            if(selectedPage !== ""){
                window.location.href = selectedPage;
            }
        }
    </script>
</body>

</html>
