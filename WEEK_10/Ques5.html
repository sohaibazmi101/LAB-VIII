<!DOCTYPE html>
<html lang="en">
<head>
    <title>Year Calendar</title>
    <style>
        body {
            background: #192c9c;
            color: aqua;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }

        #calendar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .month-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            width: 250px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-family: monospace;
        }

        .day-name {
            font-weight: bold;
            color: #ffcc00;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <h2>Enter Year</h2>
    <div class="inputType">
        <input type="number" id="yearInput" placeholder="2026" value="2026">
        <button onclick="showCalendar()">Show Calendar</button>
    </div>

    <div id="calendar"></div>

    <script>
        function showCalendar() {
            const yearVal = document.getElementById("yearInput").value;
            const y = parseInt(yearVal);
            if (!y) return;

            const months = [
                "January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];

            let output = "";

            for (let i = 0; i < months.length; i++) {
                const firstDay = new Date(y, i, 1).getDay();
                const daysInMonth = new Date(y, i + 1, 0).getDate();

                output += `<div class="month-card">`;
                output += `<h3>${months[i]}</h3>`;
                output += `<div class="days-grid">`;

                const dayLabels = ["S", "M", "T", "W", "T", "F", "S"];
                dayLabels.forEach(label => {
                    output += `<div class="day-name">${label}</div>`;
                });

                for (let s = 0; s < firstDay; s++) {
                    output += `<div class="empty-day"></div>`;
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    output += `<div>${d}</div>`;
                }

                output += `</div></div>`;
            }
            
            document.getElementById("calendar").innerHTML = output;
        }
    </script>
</body>
</html>
